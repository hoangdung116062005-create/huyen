<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Phạm Thanh Huyền</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#ffd6ec,#ffe8f5,#e0c3fc);
font-family: "Comic Sans MS", cursive;
}

.box{
text-align:center;
padding:50px;
border-radius:30px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
font-size:50px;
color:#ff4da6;
animation: glow 2s infinite alternate;
}

.info{
font-size:20px;
margin-top:10px;
}

@keyframes glow{
from{ text-shadow:0 0 10px #ff99cc;}
to{ text-shadow:0 0 30px #ff3399;}
}

.heart{
font-size:35px;
animation: bounce 1s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

</style>
</head>

<body>

<div class="box">

<div class="heart">💖 💕 💖</div>

<h1>Phạm Thanh Huyền</h1>

<div class="info">🎂 Ngày sinh: 06/02/2008</div>

<div class="info">♒ Cung hoàng đạo: Bảo Bình</div>

<div class="heart">🌸 🌷 🌸</div>

</div>

</body>
</html>
